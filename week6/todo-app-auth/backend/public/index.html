<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo APP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="container">
        <div id="signup-container">
            <h2>Signup</h2>
            <form id="signup-form">
                <label for="signup-username">Username</label>
                <input type="text" name="signup-username" id="signup-username" placeholder="Enter username">
                <label for="signup-password">Password</label>
                <input type="password" name="signup-password" id="signup-password" placeholder="Enter password">
                <button type="submit">Signup</button>
            </form>
            <p>
                Already have an account? <a href="#" id="show-signin">Signin</a>
            </p>
        </div>
        <div id="signin-container" style="display: none;">
            <h2>Signin</h2>
            <form id="signin-form">
                <label for="signin-username">Username</label>
                <input type="text" name="signin-username" id="signin-username" placeholder="Enter username">
                <label for="signin-password">Password</label>
                <input type="password" name="signin-password" id="signin-password" placeholder="Enter password">
                <button type="submit">Signin</button>
            </form>
            <p>
                Don't have an account? <a href="#" id="show-signup">Signup</a>
            </p>
        </div>
        <div id="todo-container" style="display: none;">
            <h2>Your todo</h2>
            <form id="todo-form">
                <input type="text" name="todo-input" id="todo-input" placeholder="Add a new todo">
                <button type="submit">Add Todo</button>
            </form>
            <ul id="todo-list"></ul>
        </div>
        <p id="response-message"></p>
    </div>


    <script src="script.js"></script>
</body>

</html>
