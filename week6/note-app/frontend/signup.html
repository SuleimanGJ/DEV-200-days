<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <script src="
        https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js
        "></script>
</head>

<body>
    <div id="singup-container">
        <!-- <form id="signup-form"> -->
        <label for="signup-username">Username:</label>
        <input type="text" id="signup-username" placeholder="username">
        <label for="signup-password">Password:</label>
        <input type="text" id="signup-password" placeholder="password">
        <button onclick="singup()">Signup</button>
        <!-- </form> -->
        <p>
            Already have an account <a href="singin.html" id="show-signin">Signin</a>
        </p>
    </div>


    <script>
        async function singup() {
            const username = document.querySelector("#signup-username").value;
            const password = document.querySelector("#signup-password").value;
            const response = await axios.post("http://localhost:3000/signup", {
                username, password
            });
            window.location = "/signin"

        }
    </script>
</body>

</html>
